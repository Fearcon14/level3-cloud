# Run e2e tests against API + frontend running locally on the runner; only on success push images and rollout.
# Trigger: push to Week4_API/** or Week5_Frontend/paas-ui/**
#
# Workspace path: Forgejo uses forgejo.workspace; some runners also set github.workspace. We use both.
#
# Required secrets: STACKIT_REGISTRY_USER, STACKIT_REGISTRY_PASSWORD, KUBECONFIG or KUBECONFIG_B64
# Optional vars: K8S_NAMESPACE (default: default). E2E_USERNAME/E2E_PASSWORD: set in auth.ts or via env if needed.

name: E2E then build, push and deploy

on:
  push:
    paths:
      - 'Week4_API/**'
      - 'Week5_Frontend/paas-ui/**'

jobs:
  test-and-deploy:
    runs-on: [stackit-docker]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubeconfig for API container
        run: |
          mkdir -p .kube
          if [ -n "${{ secrets.KUBECONFIG_B64 }}" ]; then
            echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > .kube/config
          else
            printf '%s' "${{ secrets.KUBECONFIG }}" > .kube/config
          fi
          chmod 600 .kube/config

      - name: Build API and frontend images (local only)
        run: |
          docker build --platform linux/amd64 -t paas-api:test Week4_API
          docker build --platform linux/amd64 -t paas-ui:test Week5_Frontend/paas-ui

      - name: Start API and frontend for e2e
        run: |
          REPO_ROOT="${{ forgejo.workspace || github.workspace }}"
          docker network create e2e-net || true
          docker run -d --network e2e-net --name api \
            -v "${REPO_ROOT}/.kube/config:/app/kubeconfig:ro" \
            -e KUBECONFIG=/app/kubeconfig \
            paas-api:test
          docker run -d --network e2e-net --name frontend \
            -v "${REPO_ROOT}/Week5_Frontend/paas-ui/nginx.e2e.conf:/etc/nginx/conf.d/default.conf:ro" \
            -p 3000:80 \
            paas-ui:test

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ && break
            sleep 2
          done
          curl -sf http://localhost:3000/

      - name: Run Playwright e2e
        run: |
          docker run --rm --network host \
            -v "${{ forgejo.workspace || github.workspace }}:/app" -w /app/Week5_Frontend/paas-ui \
            -e BASE_URL=http://localhost:3000 \
            -e CI=1 \
            mcr.microsoft.com/playwright:latest \
            sh -c "npm ci && npx playwright install --with-deps && npx playwright test"

      - name: Log in to STACKIT Container Registry
        run: |
          echo "${{ secrets.STACKIT_REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.STACKIT_REGISTRY_USER }}" --password-stdin registry.onstackit.cloud

      - name: Push API and frontend images
        run: |
          docker tag paas-api:test registry.onstackit.cloud/kevin-sinn/paas-api:latest
          docker tag paas-ui:test registry.onstackit.cloud/kevin-sinn/paas-ui:latest
          docker push registry.onstackit.cloud/kevin-sinn/paas-api:latest
          docker push registry.onstackit.cloud/kevin-sinn/paas-ui:latest

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Rollout API and UI deployments
        run: |
          export KUBECONFIG="${{ forgejo.workspace || github.workspace }}/.kube/config"
          NS="${{ vars.K8S_NAMESPACE || 'default' }}"
          kubectl rollout restart deployment/paas-api -n "$NS"
          kubectl rollout restart deployment/paas-ui -n "$NS"
          kubectl rollout status deployment/paas-api -n "$NS" --timeout=120s
          kubectl rollout status deployment/paas-ui -n "$NS" --timeout=120s
