# Run e2e tests against API (go run) + frontend (Vite dev server) on the runner; only on success push images and rollout.
# No Docker for e2e services — avoids bind-mount issues. Vite proxies /api to localhost:8080.
#
# Trigger: push to Week4_API/** or Week5_Frontend/paas-ui/**
# Required secrets: STACKIT_REGISTRY_USER, STACKIT_REGISTRY_PASSWORD, KUBECONFIG or KUBECONFIG_B64
# Optional vars: K8S_NAMESPACE (default: default).

name: E2E then build, push and deploy

on:
  push:
    paths:
      - 'Week4_API/**'
      - 'Week5_Frontend/paas-ui/**'

jobs:
  test-and-deploy:
    runs-on: [stackit-docker]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Set up kubeconfig for API
        run: |
          mkdir -p .kube
          if [ -n "${{ secrets.KUBECONFIG_B64 }}" ]; then
            echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > .kube/config
          else
            printf '%s' "${{ secrets.KUBECONFIG }}" > .kube/config
          fi
          chmod 600 .kube/config

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Week5_Frontend/paas-ui

      - name: Build API binary
        run: |
          export KUBECONFIG="${{ forgejo.workspace || github.workspace }}/.kube/config"
          cd Week4_API
          go build -o api ./cmd/api

      - name: Start API and frontend, run e2e
        run: |
          REPO_ROOT="${{ forgejo.workspace || github.workspace }}"
          export KUBECONFIG="${REPO_ROOT}/.kube/config"

          # API runs locally on the runner (port 8080); it uses KUBECONFIG to talk to the real cluster.
          (cd Week4_API && ./api) &
          API_PID=$!
          # Frontend runs locally (port 5173); proxy /api to local API so E2E never hits deployed services.
          (cd Week5_Frontend/paas-ui && VITE_API_PROXY_TARGET=http://localhost:8080 npm run dev) &
          UI_PID=$!

          echo "Waiting for API on :8080..."
          code=000
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/v1/instances 2>/dev/null || true)
            [ "$code" = "401" ] || [ "$code" = "200" ] && break
            sleep 2
          done
          if [ "$code" != "401" ] && [ "$code" != "200" ]; then
            echo "API did not become ready (got HTTP $code)"
            exit 1
          fi

          echo "Waiting for frontend on :5173..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173/ >/dev/null && break
            sleep 2
          done
          curl -sf http://localhost:5173/

          cd Week5_Frontend/paas-ui
          npx playwright install chromium --with-deps
          # BASE_URL must be the local Vite server; CI=1 restricts to Chromium only.
          BASE_URL=http://localhost:5173 CI=1 npx playwright test

          kill $API_PID $UI_PID 2>/dev/null || true

      - name: Build API and frontend images
        run: |
          docker build --platform linux/amd64 -t paas-api:test Week4_API
          docker build --platform linux/amd64 -t paas-ui:test Week5_Frontend/paas-ui

      - name: Log in to STACKIT Container Registry
        run: |
          echo "${{ secrets.STACKIT_REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.STACKIT_REGISTRY_USER }}" --password-stdin registry.onstackit.cloud

      - name: Push API and frontend images
        run: |
          docker tag paas-api:test registry.onstackit.cloud/kevin-sinn/paas-api:latest
          docker tag paas-ui:test registry.onstackit.cloud/kevin-sinn/paas-ui:latest
          docker push registry.onstackit.cloud/kevin-sinn/paas-api:latest
          docker push registry.onstackit.cloud/kevin-sinn/paas-ui:latest

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Rollout API and UI deployments
        run: |
          export KUBECONFIG="${{ forgejo.workspace || github.workspace }}/.kube/config"
          NS="${{ vars.K8S_NAMESPACE || 'default' }}"
          kubectl rollout restart deployment/paas-api -n "$NS"
          kubectl rollout restart deployment/paas-ui -n "$NS"
          kubectl rollout status deployment/paas-api -n "$NS" --timeout=120s
          kubectl rollout status deployment/paas-ui -n "$NS" --timeout=120s
