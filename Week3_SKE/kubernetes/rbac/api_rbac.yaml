apiVersion: v1
kind: ServiceAccount
metadata:
  name: paas-api
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: paas-api-redisfailover
rules:
  # Allow the API to manage RedisFailover CRs managed by the Spotahome operator
  - apiGroups: ["databases.spotahome.com"]
    resources: ["redisfailovers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pods: read for status; delete to force Redis StatefulSet to recreate pods after password change
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  # Endpoints: read-only for connection info
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]
  # Create/get namespaces for per-user tenant namespaces (created on first use)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "create"]
  # Allow managing secrets for Redis authentication
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get", "update", "patch"]
  # Rollout restart Redis/Sentinel after password regeneration (rfr-*, rfs-* workloads)
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: paas-api-redisfailover-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: paas-api-redisfailover
subjects:
  - kind: ServiceAccount
    name: paas-api
    namespace: default
