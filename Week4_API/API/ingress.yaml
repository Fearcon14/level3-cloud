# Ingress for PaaS: Web UI at / and API at /api. Requires ingress-nginx (class "nginx").
# Host: kevin-sinn.runs.onstackit.cloud. TLS secret paas-tls (e.g. from cert-manager).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: paas-api
  namespace: default
spec:
  ingressClassName: nginx
  tls:
    - hosts:
      - kevin-sinn.runs.onstackit.cloud
      secretName: paas-tls
  rules:
    - host: kevin-sinn.runs.onstackit.cloud
      http:
        paths:
          # More specific path first: /api -> API backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: paas-api
                port:
                  number: 80
          # Everything else -> Web UI (SPA)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: paas-ui
                port:
                  number: 80
