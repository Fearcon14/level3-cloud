# Deployment for the PaaS Web UI. Image from STACKIT Container Registry (https://registry.onstackit.cloud).
# If the registry is private, create a pull secret and set imagePullSecrets (see README).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paas-ui
  labels:
    app: paas-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paas-ui
  template:
    metadata:
      labels:
        app: paas-ui
    spec:
      imagePullSecrets:
        - name: stackit-registry
      containers:
        - name: ui
          image: registry.onstackit.cloud/kevin-sinn/paas-ui:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: paas-ui
  labels:
    app: paas-ui
spec:
  selector:
    app: paas-ui
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
