# Argo CD Application that deploys Grafana Loki in monolithic single-replica mode.
# Same Git path (Week6_Monitoring/k8s) is synced by the Terraform-managed "monitoring" app.
# Loki stores logs; Promtail (separate Application) sends pod logs to Loki.
# Grafana datasource for Loki is configured in kube-prometheus-stack application.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: "6.2.0"
    helm:
      values: |
        deploymentMode: SingleBinary
        singleBinary:
          replicas: 1
        loki:
          commonConfig:
            replication_factor: 1
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          pattern_ingester:
            enabled: true
          limits_config:
            allow_structured_metadata: true
            volume_enabled: true
          ruler:
            enable_api: true
        minio:
          enabled: true
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        ingester:
          replicas: 0
        querier:
          replicas: 0
        queryFrontend:
          replicas: 0
        queryScheduler:
          replicas: 0
        distributor:
          replicas: 0
        compactor:
          replicas: 0
        indexGateway:
          replicas: 0
        bloomCompactor:
          replicas: 0
        bloomGateway:
          replicas: 0
        # Disable memcached chunks cache (default requests ~9.8Gi memory) so Loki schedules on small clusters.
        chunksCache:
          replicas: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
