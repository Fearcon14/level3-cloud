# Argo CD Application that deploys Promtail to collect pod logs and send them to Loki.
# Same Git path (Week6_Monitoring/k8s) is synced by the Terraform-managed "monitoring" app.
# Promtail runs as a DaemonSet and scrapes /var/log/pods; Loki must be deployed first (application-loki.yaml).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    targetRevision: "6.15.0"
    helm:
      values: |
        daemonset:
          enabled: true
        config:
          clients:
            - url: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
