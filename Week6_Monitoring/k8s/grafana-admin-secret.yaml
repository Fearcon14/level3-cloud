# Grafana admin credentials. Referenced by kube-prometheus-stack via
# grafana.admin.existingSecret. For production, replace with a strong password
# (e.g. delete this secret and create a new one with kubectl create secret generic).
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: monitoring
type: Opaque
stringData:
  admin-user: admin
  admin-password: changeme
