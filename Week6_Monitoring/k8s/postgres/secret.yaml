# PostgreSQL credentials for the PaaS logs database.
# Override in production: use kubectl create secret, Sealed Secrets, or External Secrets.
# API connects with: postgres://paaslogs:$(POSTGRES_PASSWORD)@postgres.paas-logs.svc.cluster.local:5432/paaslogs
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: paas-logs
type: Opaque
stringData:
  POSTGRES_USER: paaslogs
  POSTGRES_PASSWORD: change-me-in-production
  POSTGRES_DB: paaslogs
